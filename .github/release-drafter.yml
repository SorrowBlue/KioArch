name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
  - title: '🧰 Chores & Maintenance'
    labels:
      - 'chore'
      - 'dependencies'
  - title: '📝 Documentation'
    labels:
      - 'documentation'
  - title: '⚙️ Refactors'
    labels:
      - 'refactor'

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'

change-title-escapes: '\<*_&'

autolabeler:
  - label: 'feature'
    branch:
      - '^feature/.*'
      - '^feat/.*'
  - label: 'bug'
    branch:
      - '^bugfix/.*'
      - '^fix/.*'
  - label: 'chore'
    branch:
      - '^chore/.*'
  - label: 'documentation'
    branch:
      - '^docs/.*'
      - '^doc/.*'
  - label: 'refactor'
    branch:
      - '^refactor/.*'
  - label: 'dependencies'
    branch:
      - '^dependencies/.*'
