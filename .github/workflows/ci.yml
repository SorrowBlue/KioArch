name: Lint, Test, and Build (main PR/push)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  check-commit:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
      - name: Check if should run
        id: check
        run: |
          IS_AUTO_COMMIT=false
          if [ "${{ github.event_name }}" = "push" ] && \
             [ "${{ github.event.head_commit.committer.name }}" = "GitHub" ]; then
            IS_AUTO_COMMIT=true
          fi

          OTHER_FILES_CHANGED="${{ steps.changed-files.outputs.any_changed }}"

          if [ "$IS_AUTO_COMMIT" = "false" ] && [ "$OTHER_FILES_CHANGED" = "true" ]; then
            echo "should-run=true" >> $GITHUB_OUTPUT
            echo "Decision: Running workflow"
          else
            echo "should-run=false" >> $GITHUB_OUTPUT
            echo "Decision: Skipping workflow"
            echo "Reasoning:"
            echo "  - Is automated push: $IS_AUTO_COMMIT"
            echo "  - Other files changed: $OTHER_FILES_CHANGED"
          fi

  lint:
    needs: check-commit
    if: needs.check-commit.outputs.should-run == 'true'
    uses: ./.github/workflows/lint.yml

  test:
    needs: check-commit
    if: needs.check-commit.outputs.should-run == 'true'
    uses: ./.github/workflows/test.yml

  build:
    needs: [ lint, test ]
    if: needs.check-commit.outputs.should-run == 'true'
    uses: ./.github/workflows/build.yml

  allchecks:
    name: All Checks Passed
    needs: build
    if: needs.check-commit.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Confirm all checks passed
        run: echo "All checks passed!"
