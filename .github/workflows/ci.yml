name: Lint, Test, and Build (main PR/push)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  check-commit:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 2
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
      - name: Check if should run
        id: check
        run: |
          IS_AUTO_COMMIT=false
          if [ "${{ github.event_name }}" = "push" ] && \
             [ "${{ github.event.head_commit.committer.name }}" = "GitHub" ]; then
            IS_AUTO_COMMIT=true
          fi

          OTHER_FILES_CHANGED="${{ steps.changed-files.outputs.any_changed }}"

          if [ "$IS_AUTO_COMMIT" = "false" ] && [ "$OTHER_FILES_CHANGED" = "true" ]; then
            echo "should-run=true" >> $GITHUB_OUTPUT
            echo "Decision: Running workflow"
          else
            echo "should-run=false" >> $GITHUB_OUTPUT
            echo "Decision: Skipping workflow"
            echo "Reasoning:"
            echo "  - Is automated push: $IS_AUTO_COMMIT"
            echo "  - Other files changed: $OTHER_FILES_CHANGED"
          fi

  lint:
    needs: check-commit
    if: needs.check-commit.outputs.should-run == 'true'
    uses: ./.github/workflows/lint.yml

  test:
    needs: check-commit
    if: needs.check-commit.outputs.should-run == 'true'
    uses: ./.github/workflows/test.yml

  build:
    needs: [ lint, test ]
    if: needs.check-commit.outputs.should-run == 'true'
    uses: ./.github/workflows/build.yml

  allchecks:
    name: All Checks Passed
    needs: [check-commit, lint, test, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Confirm all checks passed
        run: |
          if [ "${{ needs.check-commit.result }}" != "success" ]; then
            echo "Error: check-commit job did not succeed (result: ${{ needs.check-commit.result }})."
            exit 1
          fi

          if [ "${{ needs.check-commit.outputs.should-run }}" = "true" ]; then
            if [ "${{ needs.lint.result }}" != "success" ] || \
               [ "${{ needs.test.result }}" != "success" ] || \
               [ "${{ needs.build.result }}" != "success" ]; then
              echo "Error: One or more required checks failed or were skipped when they should have run."
              echo "lint: ${{ needs.lint.result }}"
              echo "test: ${{ needs.test.result }}"
              echo "build: ${{ needs.build.result }}"
              exit 1
            fi
          else
            echo "Build was skipped as check-commit.outputs.should-run is not true."
          fi
          echo "All checks passed!"
