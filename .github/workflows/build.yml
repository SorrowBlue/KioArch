name: Build

on:
  workflow_call:

jobs:

  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
      - name: Setup Java and Gradle
        uses: SorrowBlue/github-actions/.github/actions/setup-java-gradle@main
      - name: Run publishToMavenLocal
        run: ./gradlew :kioarch:publishAndroidPublicationToMavenLocal :kioarch:android:publishToMavenLocal
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android
          path: ~/.m2/repository/
          retention-days: 1

  ios-build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@0d6a7d60b009d01c9e7523be22153ff8f19460d3 # v2.2.0
        with:
          github-api-token: ${{ secrets.GITHUB_TOKEN }}
          cmake-version: '4.1.2'
      - name: Setup Java and Gradle
        uses: SorrowBlue/github-actions/.github/actions/setup-java-gradle@main
      - name: Run publishToMavenLocal
        run: >
          ./gradlew
          :kioarch:publishIosArm64PublicationToMavenLocal
          :kioarch:publishIosSimulatorArm64PublicationToMavenLocal
          :kioarch:publishIosX64PublicationToMavenLocal
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios
          path: ~/.m2/repository/
          retention-days: 1


  native-binary-build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: mac
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@0d6a7d60b009d01c9e7523be22153ff8f19460d3 # v2.2.0
        with:
          github-api-token: ${{ secrets.GITHUB_TOKEN }}
          cmake-version: '4.1.2'
      - name: Setup Java and Gradle
        uses: SorrowBlue/github-actions/.github/actions/setup-java-gradle@main
      - name: Run compileJvmNatives
        run: ./gradlew :kioarch:compileJvmNatives
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: natives-${{ matrix.name }}
          path: kioarch/build/generated/natives/
          retention-days: 1

  jvm-build:
    needs: native-binary-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@0d6a7d60b009d01c9e7523be22153ff8f19460d3 # v2.2.0
        with:
          github-api-token: ${{ secrets.GITHUB_TOKEN }}
          cmake-version: '4.1.2'
      - name: Setup Java and Gradle
        uses: SorrowBlue/github-actions/.github/actions/setup-java-gradle@main
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: natives-**
          path: kioarch/build/generated/natives/
          merge-multiple: true
      - name: Run publishToMavenLocal
        run: ./gradlew publishJvmPublicationToMavenLocal -x compileJvmNatives
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jvm-allplatform
          path: ~/.m2/repository/
          retention-days: 1
